providers:
  - name: primary
    fail_rate: 0.25
    base_latency_ms: 180
    cost_per_1k_tokens: 0.01
  - name: backup
    fail_rate: 0.05
    base_latency_ms: 260
    cost_per_1k_tokens: 0.006
circuit_breaker:
  failure_threshold: 3
  reset_timeout_seconds: 2
  success_threshold: 1
  backend: redis
  redis_url: "redis://localhost:6379/0"
  redis_prefix: "rl:cb:"
  stream_enabled: true
  stream_prefix: "rl:cb:stream:"
  stream_maxlen: 500
cache:
  enabled: true
  backend: redis
  ttl_seconds: 300
  similarity_threshold: 0.92
  redis_url: "redis://localhost:6379/0"
load_test:
  requests: 200
  concurrency: 10
  random_seed: 7
scenarios:
  - name: primary_timeout_100
    description: "Primary provider fails 100 percent; backup should absorb traffic."
    provider_overrides:
      primary: 1.0
      backup: 0.0
  - name: primary_flaky_50
    description: "Primary provider fails 50 percent; circuit should oscillate."
    provider_overrides:
      primary: 0.5
  - name: cache_stale_candidate
    description: "Cache should keep safe FAQ hits but block date-sensitive false hits."
    provider_overrides: {}
  - name: all_healthy
    description: "Baseline where both providers are healthy."
    provider_overrides:
      primary: 0.0
      backup: 0.0
